[changelog]
header = """
---
title: Changelog
description: Release history for sv11-ui, auto-generated from conventional commits.
---

"""
body = """
{% if version %}\
## {{ version | trim_start_matches(pat="v") }} — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## Unreleased
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first | split(pat="\\n") | first }} \
([{{ commit.id | truncate(length=7, end="") }}](https://github.com/twangodev/svagent-ui/commit/{{ commit.id }}))\
{% endfor %}
{% endfor %}\n
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^revert", group = "Reverts" },
  { message = "^chore", skip = true },
  { message = "^ci", skip = true },
  { message = "^build", skip = true },
  { message = "^docs", skip = true },
  { message = "^test", skip = true },
  { message = "^style", skip = true },
  { message = "^refactor", skip = true },
]
filter_commits = true
tag_pattern = "v[0-9].*"
topo_order = false
sort_commits = "newest"
